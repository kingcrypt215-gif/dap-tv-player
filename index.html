  // Logic to process channels into flat list
  channelData.forEach(item => {
    if (item.type !== "header") channelsWithCategories.push(item);
  });

  function playChannel(index) {
    const ch = channelsWithCategories[index];
    player.src({src: ch.url, type: 'application/x-mpegURL'});
    player.play();
    display.innerText = (index + 1) + ". " + ch.name;
    localStorage.setItem('dap_last_channel', index);
    titleOverlay.innerText = (index + 1) + ". " + ch.name;
    titleOverlay.style.opacity = 1;
    setTimeout(() => { titleOverlay.style.opacity = 0; }, 2000);
    document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('channel-' + index)?.classList.add('active');
  }

  function nav(direction) {
    let currentIdx = parseInt(localStorage.getItem('dap_last_channel')) || 0;
    currentIdx = (currentIdx + direction + channelsWithCategories.length) % channelsWithCategories.length;
    playChannel(currentIdx);
  }

  channelData.forEach((item, index) => {
    if (item.type === "header") {
      const h = document.createElement('div'); h.className = 'section-header'; h.innerText = item.name; list.appendChild(h);
    } else {
      const btn = document.createElement('button'); btn.className = 'btn';
      const flatIdx = channelsWithCategories.findIndex(c => c.name === item.name);
      btn.id = 'channel-' + flatIdx; btn.innerText = (flatIdx + 1) + ". " + item.name;
      btn.onclick = () => playChannel(flatIdx); list.appendChild(btn);
    }
  });
  
  const savedChannel = localStorage.getItem('dap_last_channel');
  playChannel(savedChannel !== null ? parseInt(savedChannel) : 0);
