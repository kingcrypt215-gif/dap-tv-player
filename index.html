        let player = null;

        // Initialize Playlist and Count
        function initPlaylist() {
            renderList(channels);
        }

        function renderList(listToRender) {
            const playlistEl = document.getElementById('playlist');
            playlistEl.innerHTML = '';
            document.getElementById('channel-count').innerText = listToRender.length;

            listToRender.forEach((channel) => {
                // Find true index in master array
                const originalIndex = channels.findIndex(c => c.url === channel.url);
                const li = document.createElement('li');
                li.className = 'channel-item';
                li.setAttribute('data-index', originalIndex);
                li.innerHTML = `
                    <span class="channel-category-tag">${channel.category || 'General'}</span>
                    <span class="channel-name">${channel.name}</span>
                    <span class="channel-status">Live Stream</span>
                `;
                li.onclick = () => playChannel(originalIndex);
                playlistEl.appendChild(li);
            });
        }

        // Play Selected Channel
        function playChannel(index) {
            const channel = channels[index];

            // Highlight active element in sidebar
            document.querySelectorAll('.channel-item').forEach(item => {
                item.classList.remove('active');
            });
            const activeItem = document.querySelector(`.channel-item[data-index="${index}"]`);
            if (activeItem) {
                activeItem.classList.add('active');
                activeItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            document.getElementById('now-playing').innerText = `Now Playing: ${channel.name} [${channel.category}]`;

            // Destroy existing player instance if open
            if (player) {
                player.destroy();
            }

            // Create Clappr Player Instance
            player = new Clappr.Player({
                source: channel.url,
                parentId: "#player",
                autoPlay: true,
                plugins: [LevelSelector],
                width: '100%',
                height: '100%',
                playback: {
                    controls: true,
                    externalStreams: {}
                }
            });
        }

        // Combined Filter Logic (Search + Category Dropdown)
        function filterChannels() {
            const query = document.getElementById('search-input').value.toLowerCase();
            const selectedCategory = document.getElementById('category-filter').value;

            const filtered = channels.filter(channel => {
                const matchesSearch = channel.name.toLowerCase().includes(query);
                const matchesCategory = (selectedCategory === 'ALL' || channel.category === selectedCategory);
                return matchesSearch && matchesCategory;
            });

            renderList(filtered);
        }

        // Initialize UI on load
        window.onload = () => {
            initPlaylist();
            if (channels.length > 0) {
                playChannel(0);
            }
        };
