  <style>
    body { background: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
    .app-wrapper { display: flex; flex-direction: column; height: 100vh; }
    
    #brand { text-align: center; color: #FFD700; font-size: 20px; font-weight: bold; padding: 10px; flex: 0 0 auto; }
    #channel-display { text-align: center; color: #FFD700; padding: 8px; border-bottom: 2px solid #FFD700; flex: 0 0 auto; font-size: 16px; }
    
    .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; flex: 0 0 auto; }
    .video-js { width: 100% !important; height: 100% !important; }
    
    /* Persistent Category Badge */
    #category-badge { position: absolute; top: 15px; left: 15px; z-index: 100; color: #FFD700; font-size: 14px; font-weight: bold; text-transform: uppercase; text-shadow: 1px 1px 2px #000; pointer-events: none; }
    
    /* Channel Title Overlay (Fades on every change, handles long text without clipping) */
    #fs-channel-title { 
        position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
        z-index: 100; color: #FFD700; font-weight: bold; text-shadow: 2px 2px 8px #000; 
        opacity: 0; transition: opacity 0.5s; pointer-events: none; text-align: center; 
        width: 90%; max-width: 90%; word-wrap: break-word; line-height: 1.1;
    }
    
    /* Fullscreen-only Nav (Fades on interaction) */
    .fs-nav { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); z-index: 100; display: none; gap: 20px; opacity: 0; transition: opacity 0.3s; }
    .vjs-fullscreen .fs-nav { display: flex; }
    .vjs-user-active .fs-nav { opacity: 1; }
    
    .fs-btn { background: rgba(0,0,0,0.6) !important; color: #FFD700 !important; border: 1px solid #FFD700 !important; padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 4px; }
    
    /* Original Nav Box (Fixed Position) */
    .nav-box { display: flex; justify-content: space-between; padding: 10px; flex: 0 0 auto; }
    .nav-btn { background: #FFD700; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; font-size: 16px; }
    
    #ch-list { height: 40vh; overflow-y: auto; background: #111; border-top: 1px solid #333; flex: 0 0 auto; }
    #ad-container { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; border-top: 1px solid #FFD700; }
    
    .btn { display: block; width: 100%; padding: 15px; border: none; background: #222; color: #fff; text-align: left; cursor: pointer; border-bottom: 1px solid #444; font-size: 16px; }
    .btn.active { background: #FFD700 !important; color: #000 !important; font-weight: bold; }
    .section-header { background: #000; color: #FFD700; padding: 12px; font-size: 14px; font-weight: bold; text-transform: uppercase; border-bottom: 2px solid #FFD700; border-top: 2px solid #FFD700; position: sticky; top: 0; z-index: 10; }
  </style>
</head>
<body>
<div class="app-wrapper">
  <div id="brand">D.A.P TV LIVE</div>
  <div id="channel-display">Select a Channel</div>
  <div id="player-wrapper" class="video-container">
    <div id="category-badge"></div>
    <div id="fs-channel-title"></div>
    <div class="fs-nav">
        <button class="fs-btn" onclick="nav(-1)">PREV</button>
        <button class="fs-btn" onclick="nav(1)">NEXT</button>
    </div>
    <video id="player" class="video-js vjs-default-skin" controls playsinline></video>
  </div>
  <div class="nav-box">
    <button class="nav-btn" onclick="nav(-1)">PREVIOUS</button>
    <button class="nav-btn" onclick="nav(1)">NEXT</button>
  </div>
  <div id="ch-list"></div>
  <div id="ad-container"><p style="color: #666;">AD SPACE</p></div>
</div>

<script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
<script>
  const player = videojs('player', { autoplay: true, muted: true });
  const display = document.getElementById('channel-display'), 
        badge = document.getElementById('category-badge'), 
        titleOverlay = document.getElementById('fs-channel-title'),
        list = document.getElementById('ch-list');

  function playChannel(index) {
    const ch = flatChannels[index];
    player.src({src: ch.url, type: 'application/x-mpegURL'});
    player.play();
    
    display.innerText = (index + 1) + ". " + ch.name;
    badge.innerText = ch.category;
    
    titleOverlay.innerText = (index + 1) + ". " + ch.name;
    titleOverlay.style.opacity = 1;
    
    // Dynamic Font Scaling to prevent clipping
    if (ch.name.length > 40) { titleOverlay.style.fontSize = "18px"; }
    else if (ch.name.length > 25) { titleOverlay.style.fontSize = "22px"; }
    else { titleOverlay.style.fontSize = "28px"; }

    setTimeout(() => { titleOverlay.style.opacity = 0; }, 2500);
    
    localStorage.setItem('dap_last_channel', index);
    document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById('channel-' + index)?.classList.add('active');
  }

  function nav(direction) {
    let currentIdx = parseInt(localStorage.getItem('dap_last_channel')) || 0;
    currentIdx = (currentIdx + direction + flatChannels.length) % flatChannels.length;
    playChannel(currentIdx);
  }
