    { name: "Law & Crime (Alt)", url: "https://ebd6ee5f.wurl.com/master/f36d25e7e52f1ba8d7e56eb859c636563214f541/U2Ftc3VuZ19MYXdhbmRDcmltZV9ITFM/playlist_scte.m3u8" },
    { name: "Live PD Presents", url: "https://d8o79xse42g9s.cloudfront.net/Live_PD_Presents.m3u8" }
  ];

  let currentIndex = 0;
  let currentCategory = "";
  const player = videojs('player');
  const listDiv = document.getElementById('ch-list');

  // Build List
  channelData.forEach((item, index) => {
    if (item.type === "header") {
      let head = document.createElement("div");
      head.className = "btn"; head.style.background = "#000"; head.style.color = "#FFD700"; head.innerText = item.name;
      listDiv.appendChild(head);
    } else {
      let btn = document.createElement("button");
      btn.className = "btn"; btn.innerText = item.name;
      btn.onclick = () => loadChannel(index);
      listDiv.appendChild(btn);
    }
  });

  function loadChannel(index) {
    currentIndex = index;
    const channel = channelData[index];
    player.src({ src: channel.url, type: 'application/x-mpegURL' });
    player.play();
    
    // Update Badge (find the most recent header)
    for(let i = index; i >= 0; i--) {
        if(channelData[i].type === "header") {
            currentCategory = channelData[i].name;
            break;
        }
    }
    document.getElementById('category-badge').innerText = currentCategory;
  }

  function nav(dir) {
    let next = currentIndex + dir;
    if (next < 0) next = channelData.length - 1;
    if (next >= channelData.length) next = 0;
    if (channelData[next].type === "header") {
        currentIndex = next;
        nav(dir); 
    } else {
        loadChannel(next);
    }
  }

  // UI interaction
  const container = document.getElementById('vid-cont');
  function showUI() {
    container.classList.add('active');
    clearTimeout(window.uiTimeout);
    window.uiTimeout = setTimeout(() => container.classList.remove('active'), 3000);
  }
  container.addEventListener('mousemove', showUI);
  container.addEventListener('touchstart', showUI);
</script>
</body>
</html>
